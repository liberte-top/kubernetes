name: ci.verify

on:
  workflow_dispatch: {}
  push:
    branches:
      - main

concurrency:
  group: k8s-verify
  cancel-in-progress: false

env:
  SSH_HOST: ${{ secrets.INFRA_SSH_HOST }}
  SSH_USER: ${{ secrets.INFRA_SSH_USER }}
  SSH_DEST: ${{ secrets.INFRA_SSH_USER }}@${{ secrets.INFRA_SSH_HOST }}
  INFRA_SSH_KNOWN_HOSTS: ${{ secrets.INFRA_SSH_KNOWN_HOSTS }}
  AUTH_PUBLIC_BASE_URL: https://auth.liberte.top

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Helm
        run: |
          set -euo pipefail
          if command -v helm >/dev/null 2>&1; then
            helm version
            exit 0
          fi
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Render Helm-managed manifests
        run: |
          set -euo pipefail
          helm lint ./charts/service/auth
          helm lint ./charts/app/smoke
          helm lint ./charts/app/registry
          helm lint ./charts/service/packages
          helm lint ./charts/service/crates
          mkdir -p ./manifests/service
          helm template service-auth ./charts/service/auth --namespace service > ./manifests/service/auth.yaml
          helm template app-smoke ./charts/app/smoke --namespace service > ./manifests/service/smoke.yaml
          helm template app-registry ./charts/app/registry --namespace service > ./manifests/service/registry.yaml
          helm template service-packages ./charts/service/packages --namespace service > ./manifests/service/packages.yaml
          helm template service-crates ./charts/service/crates --namespace service > ./manifests/service/crates.yaml

      - name: Install SSH key
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' '${{ secrets.INFRA_SSH_PRIVATE_KEY }}' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Prepare SSH known_hosts
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          test -n "$INFRA_SSH_KNOWN_HOSTS"
          printf '%s\n' "$INFRA_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Validate and verify ArgoCD sync
        run: |
          set -euo pipefail
          RELEASE_SHA="${GITHUB_SHA}"
          REMOTE_TMPDIR="/tmp/liberte-k8s-${RELEASE_SHA}"
          LOCAL_TMPDIR="$(mktemp -d)"
          trap 'rm -rf "$LOCAL_TMPDIR"; ssh "$SSH_DEST" "rm -rf ${REMOTE_TMPDIR}" || true' EXIT

          retry() {
            local attempts="$1"
            shift
            local i
            for i in $(seq 1 "$attempts"); do
              if "$@"; then
                return 0
              fi
              if [ "$i" -lt "$attempts" ]; then
                sleep 3
              fi
            done
            return 1
          }

          cp -R manifests "$LOCAL_TMPDIR/manifests"
          helm template service-auth ./charts/service/auth --namespace service > "$LOCAL_TMPDIR/manifests/service/auth.yaml"
          helm template app-smoke ./charts/app/smoke --namespace service > "$LOCAL_TMPDIR/manifests/service/smoke.yaml"
          helm template app-registry ./charts/app/registry --namespace service > "$LOCAL_TMPDIR/manifests/service/registry.yaml"
          helm template service-packages ./charts/service/packages --namespace service > "$LOCAL_TMPDIR/manifests/service/packages.yaml"
          helm template service-crates ./charts/service/crates --namespace service > "$LOCAL_TMPDIR/manifests/service/crates.yaml"

          retry 3 ssh "$SSH_DEST" "install -d -m 0755 ${REMOTE_TMPDIR}"
          retry 3 rsync -az "$LOCAL_TMPDIR/manifests/" "$SSH_DEST:${REMOTE_TMPDIR}/manifests/"

          retry 3 ssh "$SSH_DEST" "kubectl apply -f ${REMOTE_TMPDIR}/manifests/core/namespace.yaml"
          retry 3 ssh "$SSH_DEST" "kubectl apply -k ${REMOTE_TMPDIR}/manifests/argocd"
          retry 3 ssh "$SSH_DEST" "kubectl -n argocd annotate application system argocd.argoproj.io/refresh=hard --overwrite"
          retry 3 ssh "$SSH_DEST" 'for i in $(seq 1 60); do status=$(kubectl -n argocd get application system -o jsonpath="{.status.sync.status} {.status.health.status}"); if [ "$status" = "Synced Healthy" ]; then break; fi; sleep 5; done; test "$(kubectl -n argocd get application system -o jsonpath="{.status.sync.status} {.status.health.status}")" = "Synced Healthy"'
          retry 3 ssh "$SSH_DEST" "kubectl apply -k ${REMOTE_TMPDIR}/manifests/system --dry-run=server"
          retry 3 ssh "$SSH_DEST" "kubectl apply -k ${REMOTE_TMPDIR}/manifests/core --dry-run=server"
          retry 3 ssh "$SSH_DEST" "kubectl apply -k ${REMOTE_TMPDIR}/manifests/service --dry-run=server"
          retry 3 ssh "$SSH_DEST" "kubectl apply -f ${REMOTE_TMPDIR}/manifests/service/auth.yaml --dry-run=server"
          retry 3 ssh "$SSH_DEST" "kubectl apply -f ${REMOTE_TMPDIR}/manifests/service/smoke.yaml --dry-run=server"
          retry 3 ssh "$SSH_DEST" "kubectl apply -f ${REMOTE_TMPDIR}/manifests/service/registry.yaml --dry-run=server"
          retry 3 ssh "$SSH_DEST" "kubectl apply -f ${REMOTE_TMPDIR}/manifests/service/packages.yaml --dry-run=server"
          retry 3 ssh "$SSH_DEST" "kubectl apply -f ${REMOTE_TMPDIR}/manifests/service/crates.yaml --dry-run=server"
          retry 3 ssh "$SSH_DEST" "kubectl -n argocd annotate application core argocd.argoproj.io/refresh=hard --overwrite"
          retry 3 ssh "$SSH_DEST" "kubectl -n argocd annotate application service argocd.argoproj.io/refresh=hard --overwrite"
          retry 3 ssh "$SSH_DEST" 'for i in $(seq 1 60); do status=$(kubectl -n argocd get application service -o jsonpath="{.status.sync.status} {.status.health.status}"); if [ "$status" = "Synced Healthy" ]; then break; fi; sleep 5; done; test "$(kubectl -n argocd get application service -o jsonpath="{.status.sync.status} {.status.health.status}")" = "Synced Healthy"'
          retry 3 ssh "$SSH_DEST" 'for i in $(seq 1 60); do health=$(kubectl -n argocd get application core -o jsonpath="{.status.health.status}"); if [ "$health" = "Healthy" ]; then break; fi; sleep 5; done; test "$(kubectl -n argocd get application core -o jsonpath="{.status.health.status}")" = "Healthy"'

      - name: Smoke test public auth web
        run: |
          set -euo pipefail
          curl -fsS "${AUTH_PUBLIC_BASE_URL}/"
