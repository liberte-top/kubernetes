name: ci.verify

on:
  workflow_dispatch: {}
  push:
    branches:
      - main

concurrency:
  group: k8s-verify
  cancel-in-progress: false

env:
  SSH_HOST: ${{ secrets.INFRA_SSH_HOST }}
  SSH_USER: ${{ secrets.INFRA_SSH_USER }}
  SSH_DEST: ${{ secrets.INFRA_SSH_USER }}@${{ secrets.INFRA_SSH_HOST }}
  INFRA_SSH_KNOWN_HOSTS: ${{ secrets.INFRA_SSH_KNOWN_HOSTS }}
  POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
  POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
  POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
  RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
  AUTH_PUBLIC_BASE_URL: https://auth.liberte.top

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Helm
        run: |
          set -euo pipefail
          if command -v helm >/dev/null 2>&1; then
            helm version
            exit 0
          fi
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Render Helm-managed manifests
        run: |
          set -euo pipefail
          helm lint ./charts/service/auth
          helm lint ./charts/app/smoke
          helm template service-auth ./charts/service/auth --namespace service > ./manifests/service/auth/rendered.yaml
          helm template app-smoke ./charts/app/smoke --namespace service > ./manifests/service/smoke/rendered.yaml

      - name: Verify rendered manifests are committed
        run: |
          set -euo pipefail
          git diff --exit-code -- manifests/service/auth/rendered.yaml manifests/service/smoke/rendered.yaml

      - name: Install SSH key
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' '${{ secrets.INFRA_SSH_PRIVATE_KEY }}' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Prepare SSH known_hosts
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          test -n "$INFRA_SSH_KNOWN_HOSTS"
          printf '%s\n' "$INFRA_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Validate and verify ArgoCD sync
        run: |
          set -euo pipefail
          RELEASE_SHA="${GITHUB_SHA}"
          REMOTE_TMPDIR="/tmp/liberte-k8s-${RELEASE_SHA}"
          trap 'ssh "$SSH_DEST" "rm -rf ${REMOTE_TMPDIR}" || true' EXIT

          retry() {
            local attempts="$1"
            shift
            local i
            for i in $(seq 1 "$attempts"); do
              if "$@"; then
                return 0
              fi
              if [ "$i" -lt "$attempts" ]; then
                sleep 3
              fi
            done
            return 1
          }

          test -n "$POSTGRES_DB"
          test -n "$POSTGRES_USER"
          test -n "$POSTGRES_PASSWORD"
          test -n "$RESEND_API_KEY"

          DB_USER_ENCODED="$(python3 -c 'import os, urllib.parse; print(urllib.parse.quote(os.environ["POSTGRES_USER"], safe=""))')"
          DB_PASS_ENCODED="$(python3 -c 'import os, urllib.parse; print(urllib.parse.quote(os.environ["POSTGRES_PASSWORD"], safe=""))')"
          DATABASE_URL="postgres://${DB_USER_ENCODED}:${DB_PASS_ENCODED}@postgres.core.svc.cluster.local:5432/${POSTGRES_DB}"

          retry 3 ssh "$SSH_DEST" "install -d -m 0755 ${REMOTE_TMPDIR}"
          retry 3 rsync -az manifests/ "$SSH_DEST:${REMOTE_TMPDIR}/manifests/"

          retry 3 ssh "$SSH_DEST" "kubectl apply -f ${REMOTE_TMPDIR}/manifests/core/namespace.yaml"
          retry 3 ssh "$SSH_DEST" "kubectl apply -k ${REMOTE_TMPDIR}/manifests/argocd"
          retry 3 ssh "$SSH_DEST" "kubectl -n core create secret generic postgres --from-literal=POSTGRES_DB='${POSTGRES_DB}' --from-literal=POSTGRES_USER='${POSTGRES_USER}' --from-literal=POSTGRES_PASSWORD='${POSTGRES_PASSWORD}' --dry-run=client -o yaml | kubectl apply -f -"
          retry 3 ssh "$SSH_DEST" "kubectl -n service create secret generic auth-api-env --from-literal=DATABASE_URL='${DATABASE_URL}' --from-literal=RESEND_API_KEY='${RESEND_API_KEY}' --dry-run=client -o yaml | kubectl apply -f -"
          retry 3 ssh "$SSH_DEST" "kubectl apply -k ${REMOTE_TMPDIR}/manifests/core --dry-run=server"
          retry 3 ssh "$SSH_DEST" "kubectl apply -k ${REMOTE_TMPDIR}/manifests/service --dry-run=server"
          retry 3 ssh "$SSH_DEST" "kubectl -n argocd annotate application core argocd.argoproj.io/refresh=hard --overwrite"
          retry 3 ssh "$SSH_DEST" "kubectl -n argocd annotate application service argocd.argoproj.io/refresh=hard --overwrite"
          retry 3 ssh "$SSH_DEST" 'for i in $(seq 1 60); do status=$(kubectl -n argocd get application service -o jsonpath="{.status.sync.status} {.status.health.status}"); if [ "$status" = "Synced Healthy" ]; then break; fi; sleep 5; done; test "$(kubectl -n argocd get application service -o jsonpath="{.status.sync.status} {.status.health.status}")" = "Synced Healthy"'
          retry 3 ssh "$SSH_DEST" 'for i in $(seq 1 60); do health=$(kubectl -n argocd get application core -o jsonpath="{.status.health.status}"); if [ "$health" = "Healthy" ]; then break; fi; sleep 5; done; test "$(kubectl -n argocd get application core -o jsonpath="{.status.health.status}")" = "Healthy"'

      - name: Smoke test public auth endpoint
        run: |
          set -euo pipefail
          curl -fsS "${AUTH_PUBLIC_BASE_URL}/api/v1/health"
          python3 - <<'PY'
          import json
          import os
          import time
          import urllib.request

          suffix = time.strftime("%H%M%S")
          payload = json.dumps({
            "account_type": "user",
            "username": f"ci-{suffix}",
            "email": f"ci-{suffix}@example.com",
            "phone": None,
            "created_by": None,
          }).encode()
          req = urllib.request.Request(
            os.environ["AUTH_PUBLIC_BASE_URL"] + "/api/v1/admin/accounts",
            data=payload,
            headers={"Content-Type": "application/json"},
          )
          with urllib.request.urlopen(req, timeout=20) as resp:
            if resp.status != 201:
              raise SystemExit(f"unexpected status: {resp.status}")
            print(resp.read().decode())
          PY
