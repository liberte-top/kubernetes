name: apply

on:
  workflow_dispatch: {}

concurrency:
  group: k8s-apply
  cancel-in-progress: false

env:
  SSH_HOST: ${{ secrets.INFRA_SSH_HOST }}
  SSH_USER: ${{ secrets.INFRA_SSH_USER }}
  SSH_DEST: ${{ secrets.INFRA_SSH_USER }}@${{ secrets.INFRA_SSH_HOST }}
  INFRA_SSH_KNOWN_HOSTS: ${{ secrets.INFRA_SSH_KNOWN_HOSTS }}
  POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
  POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
  POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
  AUTH_PUBLIC_BASE_URL: https://auth.liberte.top

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.INFRA_SSH_PRIVATE_KEY }}

      - name: Prepare SSH known_hosts
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          test -n "$INFRA_SSH_KNOWN_HOSTS"
          printf '%s\n' "$INFRA_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Resolve service.auth image tags
        run: |
          set -euo pipefail
          python3 - <<'PY' >> "$GITHUB_ENV"
          import json
          import urllib.request

          def latest_success_head_sha(workflow_file: str) -> str:
            url = (
              f"https://api.github.com/repos/liberte-top/service.auth/actions/workflows/"
              f"{workflow_file}/runs?branch=main&event=push&per_page=20"
            )
            req = urllib.request.Request(url, headers={"Accept": "application/vnd.github+json"})
            with urllib.request.urlopen(req, timeout=20) as resp:
              payload = json.load(resp)
            for run in payload.get("workflow_runs", []):
              if run.get("conclusion") == "success":
                return run["head_sha"]
            raise SystemExit(f"no successful main push run found for {workflow_file}")

          api_sha = latest_success_head_sha("ci.deploy.api.yml")
          web_sha = latest_success_head_sha("ci.deploy.web.yml")
          print(f"AUTH_API_IMAGE=ghcr.io/liberte-top/service-auth-api:sha-{api_sha}")
          print(f"AUTH_WEB_IMAGE=ghcr.io/liberte-top/service-auth-web:sha-{web_sha}")
          PY

      - name: Deploy manifests
        run: |
          set -euo pipefail
          RELEASE_SHA="${GITHUB_SHA}"
          REMOTE_TMPDIR="/tmp/liberte-k8s-${RELEASE_SHA}"
          trap 'ssh "$SSH_DEST" "rm -rf ${REMOTE_TMPDIR}" || true' EXIT

          test -n "$POSTGRES_DB"
          test -n "$POSTGRES_USER"
          test -n "$POSTGRES_PASSWORD"

          DB_USER_ENCODED="$(python3 -c 'import os, urllib.parse; print(urllib.parse.quote(os.environ["POSTGRES_USER"], safe=""))')"
          DB_PASS_ENCODED="$(python3 -c 'import os, urllib.parse; print(urllib.parse.quote(os.environ["POSTGRES_PASSWORD"], safe=""))')"
          DATABASE_URL="postgres://${DB_USER_ENCODED}:${DB_PASS_ENCODED}@postgres.core.svc.cluster.local:5432/${POSTGRES_DB}"

          ssh "$SSH_DEST" "install -d -m 0755 ${REMOTE_TMPDIR}"
          rsync -az manifests/ "$SSH_DEST:${REMOTE_TMPDIR}/manifests/"

          ssh "$SSH_DEST" "kubectl apply -f ${REMOTE_TMPDIR}/manifests/core/namespace.yaml"
          ssh "$SSH_DEST" "kubectl -n core create secret generic postgres --from-literal=POSTGRES_DB='${POSTGRES_DB}' --from-literal=POSTGRES_USER='${POSTGRES_USER}' --from-literal=POSTGRES_PASSWORD='${POSTGRES_PASSWORD}' --dry-run=client -o yaml | kubectl apply -f -"
          ssh "$SSH_DEST" "kubectl -n service create secret generic auth-api-env --from-literal=DATABASE_URL='${DATABASE_URL}' --dry-run=client -o yaml | kubectl apply -f -"
          ssh "$SSH_DEST" "kubectl apply -k ${REMOTE_TMPDIR}/manifests/core --dry-run=server"
          ssh "$SSH_DEST" "kubectl apply -k ${REMOTE_TMPDIR}/manifests/core"
          ssh "$SSH_DEST" "kubectl apply -k ${REMOTE_TMPDIR}/manifests/service --dry-run=server"
          ssh "$SSH_DEST" "kubectl apply -k ${REMOTE_TMPDIR}/manifests/service"
          ssh "$SSH_DEST" "kubectl -n service delete deployment/placeholder service/placeholder --ignore-not-found=true"
          ssh "$SSH_DEST" "kubectl -n service set image deployment/auth-api auth-api=${AUTH_API_IMAGE}"
          ssh "$SSH_DEST" "kubectl -n service set image deployment/auth-web auth-web=${AUTH_WEB_IMAGE}"
          ssh "$SSH_DEST" "kubectl -n core rollout status statefulset/postgres --timeout=180s"
          ssh "$SSH_DEST" "kubectl -n service rollout status deployment/auth-api --timeout=180s"
          ssh "$SSH_DEST" "kubectl -n service rollout status deployment/auth-web --timeout=180s"

      - name: Smoke test public auth endpoint
        run: |
          set -euo pipefail
          curl -fsS "${AUTH_PUBLIC_BASE_URL}/api/v1/health"
          python3 - <<'PY'
          import json
          import os
          import time
          import urllib.request

          suffix = time.strftime("%H%M%S")
          payload = json.dumps({
            "account_type": "user",
            "username": f"ci-{suffix}",
            "email": f"ci-{suffix}@example.com",
            "phone": None,
            "created_by": None,
          }).encode()
          req = urllib.request.Request(
            os.environ["AUTH_PUBLIC_BASE_URL"] + "/api/v1/accounts",
            data=payload,
            headers={"Content-Type": "application/json"},
          )
          with urllib.request.urlopen(req, timeout=20) as resp:
            if resp.status != 201:
              raise SystemExit(f"unexpected status: {resp.status}")
            print(resp.read().decode())
          PY
