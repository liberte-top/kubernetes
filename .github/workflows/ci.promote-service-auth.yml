name: ci.promote-service-auth

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Resolve latest successful image SHAs
        run: |
          set -euo pipefail
          python3 - <<'PY' > /tmp/service-auth-images.env
          import json
          import urllib.request

          def latest_success_head_sha(workflow_file: str) -> str:
            url = (
              f"https://api.github.com/repos/liberte-top/service.auth/actions/workflows/"
              f"{workflow_file}/runs?branch=main&event=push&per_page=20"
            )
            req = urllib.request.Request(url, headers={"Accept": "application/vnd.github+json"})
            with urllib.request.urlopen(req, timeout=20) as resp:
              payload = json.load(resp)
            for run in payload.get("workflow_runs", []):
              if run.get("conclusion") == "success":
                return run["head_sha"]
            raise SystemExit(f"no successful main push run found for {workflow_file}")

          api_sha = latest_success_head_sha("ci.deploy.api.yml")
          web_sha = latest_success_head_sha("ci.deploy.web.yml")
          print(f"AUTH_API_IMAGE=ghcr.io/liberte-top/service-auth-api:sha-{api_sha}")
          print(f"AUTH_WEB_IMAGE=ghcr.io/liberte-top/service-auth-web:sha-{web_sha}")
          PY
          cat /tmp/service-auth-images.env >> "$GITHUB_ENV"

      - name: Update deployment image tags
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import os

          updates = {
            Path('manifests/service/auth/api/deployment.yaml'): ('ghcr.io/liberte-top/service-auth-api:', os.environ['AUTH_API_IMAGE']),
            Path('manifests/service/auth/web/deployment.yaml'): ('ghcr.io/liberte-top/service-auth-web:', os.environ['AUTH_WEB_IMAGE']),
          }

          for path, (prefix, replacement) in updates.items():
            text = path.read_text()
            lines = []
            for line in text.splitlines():
              stripped = line.strip()
              if stripped.startswith('image: ') and prefix in stripped:
                indent = line[:len(line) - len(line.lstrip())]
                line = f'{indent}image: {replacement}'
              lines.append(line)
            path.write_text('\n'.join(lines) + '\n')
          PY

      - name: Commit promoted image tags
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "No image tag changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add manifests/service/auth/api/deployment.yaml manifests/service/auth/web/deployment.yaml
          git commit -m "chore: promote service.auth images"
          git push origin main
