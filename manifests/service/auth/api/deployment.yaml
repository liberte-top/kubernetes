apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-api
  namespace: service
  labels:
    app: auth-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-api
  template:
    metadata:
      labels:
        app: auth-api
    spec:
      containers:
        - name: auth-api
          image: ghcr.io/liberte-top/service-auth-api:sha-f2e877083ac46f00de70b4a8c36c5e2e3b71025e
          imagePullPolicy: Always
          env:
            - name: PORT
              value: "3333"
            - name: FORWARDAUTH_SESSION_COOKIE_NAME
              value: "liberte_session"
            - name: FORWARDAUTH_SESSION_COOKIE_VALUE
              value: "demo-smoke-session"
            - name: FORWARDAUTH_LOGIN_URL
              value: "https://auth.liberte.top/"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: auth-api-env
                  key: DATABASE_URL
          ports:
            - containerPort: 3333
              name: http
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 3333
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 3333
            initialDelaySeconds: 10
            periodSeconds: 10
