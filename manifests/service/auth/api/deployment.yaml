apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-api
  namespace: service
  labels:
    app: auth-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-api
  template:
    metadata:
      labels:
        app: auth-api
    spec:
      containers:
        - name: auth-api
          image: ghcr.io/liberte-top/service-auth-api:sha-51ff14e3e21f12bd464ff10413c9a4528fc43076
          imagePullPolicy: Always
          env:
            - name: PORT
              value: "3333"
            - name: FORWARDAUTH_SESSION_COOKIE_NAME
              value: "liberte_session"
            - name: FORWARDAUTH_LOGIN_URL
              value: "https://auth.liberte.top/"
            - name: EMAIL_FROM
              value: "Auth <auth@mail.liberte.top>"
            - name: EMAIL_VERIFY_BASE_URL
              value: "https://auth.liberte.top/api/v1/auth/verify/email"
            - name: EMAIL_LOGIN_BASE_URL
              value: "https://auth.liberte.top/api/v1/auth/login/email/complete"
            - name: EMAIL_TOKEN_TTL_SECS
              value: "900"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: auth-api-env
                  key: DATABASE_URL
            - name: RESEND_API_KEY
              valueFrom:
                secretKeyRef:
                  name: auth-api-env
                  key: RESEND_API_KEY
          ports:
            - containerPort: 3333
              name: http
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 3333
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 3333
            initialDelaySeconds: 10
            periodSeconds: 10
