apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: smoke-public
  namespace: service
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  rules:
    - host: smoke.liberte.top
      http:
        paths:
          - path: /api/v1/health
            pathType: Exact
            backend:
              service:
                name: smoke-api
                port:
                  number: 4310
  tls:
    - hosts:
        - smoke.liberte.top
      secretName: smoke-liberte-top-tls
