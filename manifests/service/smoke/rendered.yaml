---
# Source: app-smoke/templates/api.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: smoke-api
  namespace: service
  labels:
    app: smoke-api
    app.kubernetes.io/name: smoke
    app.kubernetes.io/component: api
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: smoke-api
  template:
    metadata:
      labels:
        app: smoke-api
        app.kubernetes.io/name: smoke
        app.kubernetes.io/component: api
        app.kubernetes.io/managed-by: Helm
    spec:
      containers:
        - name: smoke-api
          image: ghcr.io/liberte-top/app-smoke-api:sha-8e712f0d2898f68dc4c3148c92f71bd658b57270
          imagePullPolicy: Always
          env:
            - name: PORT
              value: "4310"
          ports:
            - containerPort: 4310
              name: http
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 4310
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 4310
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            limits:
              cpu: 250m
              memory: 256Mi
            requests:
              cpu: 50m
              memory: 64Mi
---
# Source: app-smoke/templates/web.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: smoke-web
  namespace: service
  labels:
    app: smoke-web
    app.kubernetes.io/name: smoke
    app.kubernetes.io/component: web
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: smoke-web
  template:
    metadata:
      labels:
        app: smoke-web
        app.kubernetes.io/name: smoke
        app.kubernetes.io/component: web
        app.kubernetes.io/managed-by: Helm
    spec:
      containers:
        - name: smoke-web
          image: ghcr.io/liberte-top/app-smoke-web:sha-8e712f0d2898f68dc4c3148c92f71bd658b57270
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 100m
              memory: 128Mi
            requests:
              cpu: 25m
              memory: 32Mi
---
# Source: app-smoke/templates/ingress.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: smoke
  namespace: service
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: "service-smoke-forward-auth@kubernetescrd"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: traefik
  rules:
    - host: smoke.liberte.top
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: smoke-web
                port:
                  number: 80
  tls:
    - hosts:
        - smoke.liberte.top
      secretName: smoke-liberte-top-tls
---
# Source: app-smoke/templates/ingress.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: smoke-public
  namespace: service
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: traefik
  rules:
    - host: smoke.liberte.top
      http:
        paths:
          - path: /api/v1/health
            pathType: Exact
            backend:
              service:
                name: smoke-api
                port:
                  number: 4310
  tls:
    - hosts:
        - smoke.liberte.top
      secretName: smoke-liberte-top-tls
---
# Source: app-smoke/templates/middleware.yaml
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: smoke-forward-auth
  namespace: service
spec:
  forwardAuth:
    address: http://auth-api.service.svc.cluster.local:3333/internal/auth/session/check
    trustForwardHeader: true
    authResponseHeaders:
      - X-Auth-Subject
      - X-Auth-Type
      - X-Auth-Scopes
      - X-Auth-Email
      - X-Auth-Profile-Id
