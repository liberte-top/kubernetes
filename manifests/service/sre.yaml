    app.kubernetes.io/name: sre
    app.kubernetes.io/component: api
    app.kubernetes.io/managed-by: Helm
spec:
  type: ClusterIP
  selector:
    app: sre-api
  ports:
    - name: http
      port: 3333
      targetPort: 3333
---
# Source: app-sre/templates/web.yaml
apiVersion: v1
kind: Service
metadata:
  name: sre-web
  namespace: service
  labels:
    app: sre-web
    app.kubernetes.io/name: sre
    app.kubernetes.io/component: web
    app.kubernetes.io/managed-by: Helm
spec:
  type: ClusterIP
  selector:
    app: sre-web
  ports:
    - name: http
      port: 80
      targetPort: 80
---
# Source: app-sre/templates/api.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sre-api
  namespace: service
  labels:
    app: sre-api
    app.kubernetes.io/name: sre
    app.kubernetes.io/component: api
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: sre-api
  template:
    metadata:
      labels:
        app: sre-api
        app.kubernetes.io/name: sre
        app.kubernetes.io/component: api
        app.kubernetes.io/managed-by: Helm
    spec:
      imagePullSecrets:
        - name: packages-ghcr-pull
      containers:
        - name: sre-api
          image: ghcr.io/liberte-top/service-sre-api:sha-0000000000000000000000000000000000000000
          imagePullPolicy: Always
          env:
            - name: PORT
              value: "3333"
            - name: SRE_REQUIRED_SCOPE
              value: "sre:admin"
            - name: SRE_DATABASE_URL_AUTH
              valueFrom:
                secretKeyRef:
                  name: sre-api-env
                  key: DATABASE_URL_AUTH
                  optional: false
          ports:
            - containerPort: 3333
              name: http
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 3333
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 3333
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            limits:
              cpu: 200m
              memory: 192Mi
            requests:
              cpu: 25m
              memory: 32Mi
---
# Source: app-sre/templates/web.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sre-web
  namespace: service
  labels:
    app: sre-web
    app.kubernetes.io/name: sre
    app.kubernetes.io/component: web
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: sre-web
  template:
    metadata:
      labels:
        app: sre-web
        app.kubernetes.io/name: sre
        app.kubernetes.io/component: web
        app.kubernetes.io/managed-by: Helm
    spec:
      imagePullSecrets:
        - name: packages-ghcr-pull
      containers:
        - name: sre-web
          image: ghcr.io/liberte-top/service-sre-web:sha-0000000000000000000000000000000000000000
          imagePullPolicy: Always
          env:
            - name: SRE_API_INTERNAL_URL
              value: "http://sre-api:3333"
          ports:
            - containerPort: 80
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 100m
              memory: 128Mi
            requests:
              cpu: 25m
              memory: 32Mi
---
# Source: app-sre/templates/ingress.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sre
  namespace: service
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: "service-sre-forward-auth@kubernetescrd"
    
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: traefik
  rules:
    - host: sre.liberte.top
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sre-web
                port:
                  number: 80
  
  tls:
    - hosts:
        - sre.liberte.top
      secretName: sre-liberte-top-tls
---
# Source: app-sre/templates/middleware.yaml
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: sre-forward-auth
  namespace: service
spec:
  forwardAuth:
    address: http://auth-api.service.svc.cluster.local:3333/internal/auth/session/check
    trustForwardHeader: true
    authResponseHeaders:
      - X-Auth-Subject
      - X-Auth-Type
      - X-Auth-Scopes
      - X-Auth-Email
      - X-Auth-Profile-Id
