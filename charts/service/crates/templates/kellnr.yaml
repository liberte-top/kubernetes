{{- if .Values.kellnr.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "crates.componentName" (dict "root" . "component" "kellnr") }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ include "crates.componentName" (dict "root" . "component" "kellnr") }}
{{ include "crates.labels" (dict "root" . "component" "kellnr") | indent 4 }}
spec:
  replicas: {{ .Values.kellnr.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "crates.componentName" (dict "root" . "component" "kellnr") }}
  template:
    metadata:
      labels:
        app: {{ include "crates.componentName" (dict "root" . "component" "kellnr") }}
{{ include "crates.labels" (dict "root" . "component" "kellnr") | indent 8 }}
{{- with .Values.podAnnotations }}
      annotations:
{{ toYaml . | indent 8 }}
{{- end }}
    spec:
{{- if .Values.imagePullSecrets }}
      imagePullSecrets:
{{- range .Values.imagePullSecrets }}
        - name: {{ . }}
{{- end }}
{{- end }}
      containers:
        - name: kellnr
          image: {{ .Values.kellnr.image.repository }}:{{ .Values.kellnr.image.tag }}
          imagePullPolicy: {{ .Values.kellnr.image.pullPolicy }}
          env:
{{- range $key, $value := .Values.kellnr.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
{{- end }}
          envFrom:
            - secretRef:
                name: {{ .Values.kellnr.secretName }}
          ports:
            - containerPort: {{ .Values.kellnr.port }}
              name: http
          readinessProbe:
            httpGet:
              path: {{ .Values.kellnr.readinessProbe.path }}
              port: {{ .Values.kellnr.port }}
            initialDelaySeconds: {{ .Values.kellnr.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.kellnr.readinessProbe.periodSeconds }}
          livenessProbe:
            httpGet:
              path: {{ .Values.kellnr.livenessProbe.path }}
              port: {{ .Values.kellnr.port }}
            initialDelaySeconds: {{ .Values.kellnr.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.kellnr.livenessProbe.periodSeconds }}
          resources:
{{ toYaml .Values.kellnr.resources | indent 12 }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.kellnr.dataDir }}
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "crates.componentName" (dict "root" . "component" "kellnr") }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ include "crates.componentName" (dict "root" . "component" "kellnr") }}
{{ include "crates.labels" (dict "root" . "component" "kellnr") | indent 4 }}
spec:
  type: ClusterIP
  selector:
    app: {{ include "crates.componentName" (dict "root" . "component" "kellnr") }}
  ports:
    - name: http
      port: {{ .Values.kellnr.service.port }}
      targetPort: {{ .Values.kellnr.port }}
{{- end }}
