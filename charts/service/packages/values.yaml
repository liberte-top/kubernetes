namespace: service

commonLabels: {}
podAnnotations: {}
imagePullSecrets:
  - packages-ghcr-pull

app:
  name: packages

minio:
  enabled: false
  replicaCount: 1
  image:
    repository: quay.io/minio/minio
    tag: RELEASE.2025-09-07T16-13-09Z
    pullPolicy: IfNotPresent
  port: 9000
  consolePort: 9001
  service:
    port: 9000
    consolePort: 9001
  secretName: packages-minio-env
  bucket: verdaccio
  persistence:
    size: 10Gi
  readinessProbe:
    path: /minio/health/ready
    initialDelaySeconds: 5
    periodSeconds: 10
  livenessProbe:
    path: /minio/health/live
    initialDelaySeconds: 15
    periodSeconds: 20
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

mc:
  image:
    repository: quay.io/minio/mc
    tag: RELEASE.2025-08-13T08-35-41Z
    pullPolicy: IfNotPresent

verdaccio:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/liberte-top/verdaccio-s3
    tag: minio-poc-v5-20260508
    pullPolicy: Always
  port: 4873
  service:
    port: 4873
  secretName: packages-verdaccio-env
  authSecretName: packages-verdaccio-auth
  auth:
    maxUsers: 2
  s3:
    envFromSecret: true
    ensureBucket: false
    bucket: configured-by-secret
    keyPrefix: npm/
    region: auto
    endpoint: configured-by-secret
    forcePathStyle: true
  readinessProbe:
    path: /-/ping
    initialDelaySeconds: 5
    periodSeconds: 10
  livenessProbe:
    path: /-/ping
    initialDelaySeconds: 15
    periodSeconds: 20
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

ingress:
  className: traefik
  host: packages.liberte.top
  tls:
    enabled: true
    secretName: packages-liberte-top-tls
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
