{{- if .Values.verdaccio.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "packages.componentName" (dict "root" . "component" "verdaccio") }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ include "packages.componentName" (dict "root" . "component" "verdaccio") }}
{{ include "packages.labels" (dict "root" . "component" "verdaccio") | indent 4 }}
spec:
  replicas: {{ .Values.verdaccio.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "packages.componentName" (dict "root" . "component" "verdaccio") }}
  template:
    metadata:
      labels:
        app: {{ include "packages.componentName" (dict "root" . "component" "verdaccio") }}
{{ include "packages.labels" (dict "root" . "component" "verdaccio") | indent 8 }}
{{- with .Values.podAnnotations }}
      annotations:
{{ toYaml . | indent 8 }}
{{- end }}
    spec:
{{- if .Values.imagePullSecrets }}
      imagePullSecrets:
{{- range .Values.imagePullSecrets }}
        - name: {{ . }}
{{- end }}
{{- end }}
{{- if and .Values.minio.enabled .Values.verdaccio.s3.ensureBucket }}
      initContainers:
        - name: ensure-bucket
          image: {{ .Values.mc.image.repository }}:{{ .Values.mc.image.tag }}
          imagePullPolicy: {{ .Values.mc.image.pullPolicy }}
          envFrom:
            - secretRef:
                name: {{ .Values.minio.secretName }}
          command:
            - /bin/sh
            - -ec
          args:
            - |
              until mc alias set packages-minio http://{{ include "packages.componentName" (dict "root" . "component" "minio") }}:{{ .Values.minio.service.port }} "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"; do
                sleep 2
              done
              mc mb --ignore-existing packages-minio/{{ .Values.minio.bucket }}
{{- end }}
      containers:
        - name: verdaccio
          image: {{ .Values.verdaccio.image.repository }}:{{ .Values.verdaccio.image.tag }}
          imagePullPolicy: {{ .Values.verdaccio.image.pullPolicy }}
{{- if .Values.verdaccio.s3.envFromSecret }}
          envFrom:
            - secretRef:
                name: {{ .Values.verdaccio.secretName }}
{{- else }}
          env:
            - name: VERDACCIO_S3_BUCKET
              value: {{ .Values.verdaccio.s3.bucket | quote }}
            - name: VERDACCIO_S3_KEY_PREFIX
              value: {{ .Values.verdaccio.s3.keyPrefix | quote }}
            - name: VERDACCIO_S3_REGION
              value: {{ .Values.verdaccio.s3.region | quote }}
            - name: VERDACCIO_S3_ENDPOINT
              value: {{ .Values.verdaccio.s3.endpoint | quote }}
            - name: VERDACCIO_S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.verdaccio.secretName }}
                  key: VERDACCIO_S3_ACCESS_KEY_ID
            - name: VERDACCIO_S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.verdaccio.secretName }}
                  key: VERDACCIO_S3_SECRET_ACCESS_KEY
{{- end }}
          ports:
            - containerPort: {{ .Values.verdaccio.port }}
              name: http
          readinessProbe:
            httpGet:
              path: {{ .Values.verdaccio.readinessProbe.path }}
              port: {{ .Values.verdaccio.port }}
            initialDelaySeconds: {{ .Values.verdaccio.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.verdaccio.readinessProbe.periodSeconds }}
          livenessProbe:
            httpGet:
              path: {{ .Values.verdaccio.livenessProbe.path }}
              port: {{ .Values.verdaccio.port }}
            initialDelaySeconds: {{ .Values.verdaccio.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.verdaccio.livenessProbe.periodSeconds }}
          resources:
{{ toYaml .Values.verdaccio.resources | indent 12 }}
          volumeMounts:
            - name: config
              mountPath: /verdaccio/conf/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: auth
              mountPath: /verdaccio/auth
              readOnly: true
            - name: storage
              mountPath: /verdaccio/storage
      volumes:
        - name: config
          configMap:
            name: {{ include "packages.componentName" (dict "root" . "component" "verdaccio-config") }}
        - name: auth
          secret:
            secretName: {{ .Values.verdaccio.authSecretName }}
        - name: storage
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "packages.componentName" (dict "root" . "component" "verdaccio") }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ include "packages.componentName" (dict "root" . "component" "verdaccio") }}
{{ include "packages.labels" (dict "root" . "component" "verdaccio") | indent 4 }}
spec:
  type: ClusterIP
  selector:
    app: {{ include "packages.componentName" (dict "root" . "component" "verdaccio") }}
  ports:
    - name: http
      port: {{ .Values.verdaccio.service.port }}
      targetPort: {{ .Values.verdaccio.port }}
{{- end }}
