{{- if .Values.minio.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "packages.componentName" (dict "root" . "component" "minio") }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ include "packages.componentName" (dict "root" . "component" "minio") }}
{{ include "packages.labels" (dict "root" . "component" "minio") | indent 4 }}
spec:
  serviceName: {{ include "packages.componentName" (dict "root" . "component" "minio") }}
  replicas: {{ .Values.minio.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "packages.componentName" (dict "root" . "component" "minio") }}
  template:
    metadata:
      labels:
        app: {{ include "packages.componentName" (dict "root" . "component" "minio") }}
{{ include "packages.labels" (dict "root" . "component" "minio") | indent 8 }}
{{- with .Values.podAnnotations }}
      annotations:
{{ toYaml . | indent 8 }}
{{- end }}
    spec:
{{- if .Values.imagePullSecrets }}
      imagePullSecrets:
{{- range .Values.imagePullSecrets }}
        - name: {{ . }}
{{- end }}
{{- end }}
      containers:
        - name: minio
          image: {{ .Values.minio.image.repository }}:{{ .Values.minio.image.tag }}
          imagePullPolicy: {{ .Values.minio.image.pullPolicy }}
          args:
            - server
            - /data
            - --console-address
            - ":{{ .Values.minio.consolePort }}"
          envFrom:
            - secretRef:
                name: {{ .Values.minio.secretName }}
          ports:
            - containerPort: {{ .Values.minio.port }}
              name: s3
            - containerPort: {{ .Values.minio.consolePort }}
              name: console
          readinessProbe:
            httpGet:
              path: {{ .Values.minio.readinessProbe.path }}
              port: {{ .Values.minio.port }}
            initialDelaySeconds: {{ .Values.minio.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.minio.readinessProbe.periodSeconds }}
          livenessProbe:
            httpGet:
              path: {{ .Values.minio.livenessProbe.path }}
              port: {{ .Values.minio.port }}
            initialDelaySeconds: {{ .Values.minio.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.minio.livenessProbe.periodSeconds }}
          resources:
{{ toYaml .Values.minio.resources | indent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: {{ .Values.minio.persistence.size }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "packages.componentName" (dict "root" . "component" "minio") }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ include "packages.componentName" (dict "root" . "component" "minio") }}
{{ include "packages.labels" (dict "root" . "component" "minio") | indent 4 }}
spec:
  type: ClusterIP
  selector:
    app: {{ include "packages.componentName" (dict "root" . "component" "minio") }}
  ports:
    - name: s3
      port: {{ .Values.minio.service.port }}
      targetPort: {{ .Values.minio.port }}
    - name: console
      port: {{ .Values.minio.service.consolePort }}
      targetPort: {{ .Values.minio.consolePort }}
{{- end }}
