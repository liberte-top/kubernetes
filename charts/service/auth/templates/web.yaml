{{- if .Values.web.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "service-auth.componentName" (dict "root" . "component" "web") }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ include "service-auth.componentName" (dict "root" . "component" "web") }}
{{ include "service-auth.labels" (dict "root" . "component" "web") | indent 4 }}
spec:
  replicas: {{ .Values.web.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "service-auth.componentName" (dict "root" . "component" "web") }}
  template:
    metadata:
      labels:
        app: {{ include "service-auth.componentName" (dict "root" . "component" "web") }}
{{ include "service-auth.labels" (dict "root" . "component" "web") | indent 8 }}
{{- with .Values.podAnnotations }}
      annotations:
{{ toYaml . | indent 8 }}
{{- end }}
    spec:
      containers:
        - name: auth-web
          image: {{ .Values.web.image.repository }}:{{ .Values.web.image.tag }}
          imagePullPolicy: {{ .Values.web.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.web.port }}
              name: http
          readinessProbe:
            httpGet:
              path: {{ .Values.web.readinessProbe.path }}
              port: {{ .Values.web.port }}
            initialDelaySeconds: {{ .Values.web.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.web.readinessProbe.periodSeconds }}
          livenessProbe:
            httpGet:
              path: {{ .Values.web.livenessProbe.path }}
              port: {{ .Values.web.port }}
            initialDelaySeconds: {{ .Values.web.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.web.livenessProbe.periodSeconds }}
{{- with .Values.web.resources }}
          resources:
{{ toYaml . | indent 12 }}
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "service-auth.componentName" (dict "root" . "component" "web") }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ include "service-auth.componentName" (dict "root" . "component" "web") }}
{{ include "service-auth.labels" (dict "root" . "component" "web") | indent 4 }}
spec:
  type: ClusterIP
  selector:
    app: {{ include "service-auth.componentName" (dict "root" . "component" "web") }}
  ports:
    - name: http
      port: {{ .Values.web.service.port }}
      targetPort: {{ .Values.web.port }}
{{- end }}
