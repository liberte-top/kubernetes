namespace: service

commonLabels: {}
podAnnotations: {}

app:
  name: auth

ingress:
  className: traefik
  host: auth.liberte.top
  tls:
    enabled: true
    secretName: auth-liberte-top-tls
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod

api:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/liberte-top/service-auth-api
    tag: sha-50b169067a4c0d62523a8e48a8795971eeecf73e # auth-api-image
    pullPolicy: Always
  port: 3333
  service:
    port: 3333
  env:
    PORT: "3333"
    FORWARDAUTH_SESSION_COOKIE_NAME: liberte_session
    FORWARDAUTH_SESSION_COOKIE_DOMAIN: .liberte.top
    FORWARDAUTH_LOGIN_URL: https://auth.liberte.top/
    EMAIL_FROM: Auth <auth@mail.liberte.top>
    EMAIL_VERIFY_BASE_URL: https://auth.liberte.top/api/v1/auth/verify/email
    EMAIL_LOGIN_BASE_URL: https://auth.liberte.top/api/v1/auth/login/email/complete
    EMAIL_TOKEN_TTL_SECS: "900"
  secretEnv:
    DATABASE_URL:
      secretName: auth-api-env
      secretKey: DATABASE_URL
    RESEND_API_KEY:
      secretName: auth-api-env
      secretKey: RESEND_API_KEY
  readinessProbe:
    path: /api/v1/health
    initialDelaySeconds: 3
    periodSeconds: 5
  livenessProbe:
    path: /api/v1/health
    initialDelaySeconds: 10
    periodSeconds: 10
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

web:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/liberte-top/service-auth-web
    tag: sha-50b169067a4c0d62523a8e48a8795971eeecf73e # auth-web-image
    pullPolicy: Always
  port: 80
  service:
    port: 80
  readinessProbe:
    path: /
    initialDelaySeconds: 2
    periodSeconds: 5
  livenessProbe:
    path: /
    initialDelaySeconds: 5
    periodSeconds: 10
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi
